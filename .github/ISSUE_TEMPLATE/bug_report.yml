name: Bug report
description: Report a problem in Termia
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include passwords, private keys,
        server addresses, exported configuration files, or screenshots that expose
        sensitive data.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open Termia
        2. Create or select a server
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Linux distribution, desktop, display server, and Termia version if known.
      placeholder: "Ubuntu 24.04.4 LTS, GNOME 46.0, Wayland, Termia 0.1.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output only after removing sensitive data.
    validations:
      required: false
